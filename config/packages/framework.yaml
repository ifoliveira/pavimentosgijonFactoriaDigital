# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    default_locale: 'es'
    #csrf_protection: true
    #http_method_override: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native  # ← resuelve la deprecation

    #esi: true
    #fragments: true
    php_errors:
        log: true